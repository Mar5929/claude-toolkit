<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIAGRAM_TITLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F172A; --bg-card: #1E293B; --bg-hover: #334155;
      --border: #334155; --text: #F1F5F9; --text-dim: #94A3B8; --text-muted: #64748B;
      --accent: #7C3AED;
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: var(--font-ui); background: var(--bg); color: var(--text); overflow: hidden; }
    svg.diagram { width: 100%; height: 100%; display: block; }

    .controls { position: fixed; top: 16px; left: 16px; display: flex; gap: 8px; z-index: 100; }
    .controls button { font-family: var(--font-ui); font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; transition: background .15s; }
    .controls button:hover { background: var(--bg-hover); }

    .title-bar { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 90; pointer-events: none; }
    .title-bar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .title-bar .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .tooltip { position: fixed; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; line-height: 1.5; max-width: 300px; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .tooltip.visible { opacity: 1; }
    .tooltip .tt-name { font-weight: 600; margin-bottom: 4px; }
    .tooltip .tt-category { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .tooltip .tt-desc { color: var(--text-dim); font-size: 12px; }

    .sidebar { position: fixed; top: 0; right: -380px; width: 380px; height: 100%; background: var(--bg-card); border-left: 1px solid var(--border); padding: 24px; overflow-y: auto; z-index: 150; transition: right .25s ease; }
    .sidebar.open { right: 0; }
    .sidebar-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; }
    .sidebar-close:hover { color: var(--text); }
    .sidebar h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sidebar .sb-category { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
    .sidebar .sb-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; }
    .sidebar h3 { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .sidebar .sb-connections { list-style: none; }
    .sidebar .sb-connections li { font-size: 13px; padding: 4px 0; color: var(--text); border-bottom: 1px solid var(--border); }

    .legend { position: fixed; bottom: 16px; left: 16px; display: flex; flex-wrap: wrap; gap: 12px; z-index: 100; background: rgba(15,23,42,.85); backdrop-filter: blur(8px); padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }

    .node-label { font-family: var(--font-ui); font-size: 12px; fill: var(--text); text-anchor: middle; pointer-events: none; user-select: none; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    .edge { stroke: #94A3B8; stroke-width: 1.5; fill: none; opacity: .7; }

    @keyframes pulse-flow { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
    .edge-animated { stroke-dasharray: 6 4; animation: pulse-flow .8s linear infinite; }
  </style>
</head>
<body>
  <div class="controls">
    <button id="btn-reset">Reset Zoom</button>
  </div>

  <div class="title-bar">
    <h1>DIAGRAM_TITLE</h1>
    <div class="subtitle">DIAGRAM_SUBTITLE</div>
  </div>

  <svg class="diagram" id="svg" shape-rendering="geometricPrecision" text-rendering="optimizeLegibility"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
  (() => {
    // ============================================================
    //  DATA SECTION — Replace with your actual data
    // ============================================================
    const steps = [
      { id: 'commit',   name: 'Commit',   order: 0, category: 'process',  description: 'Push code changes' },
      { id: 'build',    name: 'Build',    order: 1, category: 'process',  description: 'Compile and bundle' },
      { id: 'test',     name: 'Test',     order: 2, category: 'process',  description: 'Run test suites' },
      { id: 'deploy',   name: 'Deploy',   order: 3, category: 'process',  description: 'Deploy to environment' },
      { id: 'monitor',  name: 'Monitor',  order: 4, category: 'decision', description: 'Watch metrics and logs' },
      { id: 'feedback', name: 'Feedback', order: 5, category: 'process',  description: 'Gather user feedback' },
    ];

    const edges = [
      { source: 'commit',   target: 'build' },
      { source: 'build',    target: 'test' },
      { source: 'test',     target: 'deploy' },
      { source: 'deploy',   target: 'monitor' },
      { source: 'monitor',  target: 'feedback' },
      { source: 'feedback', target: 'commit' },
    ];

    const centerLabel = 'CI/CD Cycle';

    // Optional: sub-loop steps (set subloop: true on steps that participate)
    // const subLoopLabel = 'Sub-Loop';
    // ============================================================
    //  END DATA SECTION
    // ============================================================

    const COLORS = { process: '#0284C7', decision: '#CA8A04' };
    function color(cat) { return COLORS[cat] || '#64748B'; }

    const width = window.innerWidth;
    const height = window.innerHeight;
    const cx = 0, cy = 0;
    const outerR = Math.min(width, height) * 0.32;
    const nodeR = 26;

    const svg = d3.select('#svg');
    const g = svg.append('g');

    // Zoom
    const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => g.attr('transform', e.transform));
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.9));
    document.getElementById('btn-reset').onclick = () => {
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.9));
    };

    // Tooltip
    const tooltipEl = document.createElement('div');
    tooltipEl.className = 'tooltip';
    tooltipEl.innerHTML = '<div class="tt-name"></div><div class="tt-category"></div><div class="tt-desc"></div>';
    document.body.appendChild(tooltipEl);
    const tooltip = {
      show(d, event) {
        tooltipEl.querySelector('.tt-name').textContent = d.name || d.id;
        tooltipEl.querySelector('.tt-category').textContent = d.category || '';
        tooltipEl.querySelector('.tt-desc').textContent = d.description || '';
        tooltipEl.classList.add('visible');
        let x = event.clientX + 12, y = event.clientY + 12;
        if (x + 310 > window.innerWidth) x = event.clientX - 310;
        if (y + tooltipEl.offsetHeight > window.innerHeight) y = event.clientY - tooltipEl.offsetHeight - 12;
        tooltipEl.style.left = x + 'px'; tooltipEl.style.top = y + 'px';
      },
      hide() { tooltipEl.classList.remove('visible'); }
    };

    // Sidebar
    const sidebarEl = document.createElement('div');
    sidebarEl.className = 'sidebar';
    sidebarEl.innerHTML = '<button class="sidebar-close">&times;</button><h2 class="sb-name"></h2><div class="sb-category"></div><div class="sb-desc"></div><h3>Connections</h3><ul class="sb-connections"></ul>';
    document.body.appendChild(sidebarEl);
    sidebarEl.querySelector('.sidebar-close').onclick = () => sidebarEl.classList.remove('open');
    const sidebar = {
      show(d) {
        sidebarEl.querySelector('.sb-name').textContent = d.name || d.id;
        sidebarEl.querySelector('.sb-category').textContent = d.category || '';
        sidebarEl.querySelector('.sb-desc').textContent = d.description || '';
        const connIds = new Set();
        edges.forEach(e => { if (e.source === d.id) connIds.add(e.target); if (e.target === d.id) connIds.add(e.source); });
        const ul = sidebarEl.querySelector('.sb-connections');
        ul.innerHTML = '';
        connIds.forEach(id => {
          const n = steps.find(s => s.id === id);
          const li = document.createElement('li');
          li.textContent = n ? n.name : id;
          ul.appendChild(li);
        });
        sidebarEl.classList.add('open');
      },
      close() { sidebarEl.classList.remove('open'); }
    };

    // contrastText utility
    function contrastText(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#0F172A' : '#F1F5F9';
    }

    // Arrow markers — supports filled, open, hollow arrowhead types
    const defs = svg.append('defs');
    function getArrowId(clr, arrowhead) {
      const type = arrowhead || 'filled';
      if (type === 'none') return null;
      const id = 'arrow-' + type + '-' + clr.replace('#', '');
      if (!defs.select('#' + id).node()) {
        const marker = defs.append('marker').attr('id', id).attr('viewBox', '0 0 10 10')
          .attr('refX', 10).attr('refY', 5).attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto');
        if (type === 'open') {
          marker.append('path').attr('d', 'M0,0 L10,5 L0,10').attr('fill', 'none').attr('stroke', clr).attr('stroke-width', 1.5);
        } else if (type === 'hollow') {
          marker.append('path').attr('d', 'M0,0 L10,5 L0,10 Z').attr('fill', '#0F172A').attr('stroke', clr).attr('stroke-width', 1.5);
        } else {
          marker.append('path').attr('d', 'M0,0 L10,5 L0,10 Z').attr('fill', clr);
        }
      }
      return 'url(#' + id + ')';
    }

    // Edge style helper
    function applyEdgeStyle(edgeEl, e) {
      if (e.style === 'dashed') {
        edgeEl.attr('stroke-dasharray', '8 4').classed('edge-animated', false);
      } else if (e.style === 'dotted') {
        edgeEl.attr('stroke-dasharray', '2 4').classed('edge-animated', false);
      }
      if (e.weight === 'bold') {
        edgeEl.attr('stroke-width', 3).style('filter', 'drop-shadow(0 0 6px ' + (edgeEl.attr('stroke') || '#94A3B8') + ')');
      } else if (e.weight === 'thin') {
        edgeEl.attr('stroke-width', 1);
      }
    }

    // Position steps on ring
    const n = steps.length;
    const stepMap = {};
    steps.forEach((s, i) => {
      const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
      s.angle = angle;
      s.x = cx + outerR * Math.cos(angle);
      s.y = cy + outerR * Math.sin(angle);
      stepMap[s.id] = s;
    });

    // Outer ring track
    g.append('circle').attr('cx', cx).attr('cy', cy).attr('r', outerR)
      .attr('fill', 'none').attr('stroke', '#1E293B').attr('stroke-width', 40).attr('opacity', 0.5);

    // Optional sub-loop ring (uncomment and configure if needed)
    // const innerR = outerR * 0.5;
    // g.append('circle').attr('cx', cx).attr('cy', cy).attr('r', innerR)
    //   .attr('fill', 'none').attr('stroke', '#CA8A04').attr('stroke-width', 2)
    //   .attr('stroke-dasharray', '6 4').attr('opacity', 0.3);
    // g.append('text').attr('x', cx).attr('y', cy - innerR + 20)
    //   .attr('text-anchor', 'middle').attr('font-size', 11).attr('font-family', 'var(--font-mono)')
    //   .attr('fill', '#CA8A04').attr('opacity', 0.6).text(subLoopLabel);

    // Edges
    const edgeG = g.append('g');
    edges.forEach(e => {
      const s = stepMap[e.source], t = stepMap[e.target];
      if (!s || !t) return;

      // Check if this wraps around (last to first)
      const isWrap = s.order === steps.length - 1 && t.order === 0;

      if (isWrap) {
        const wrapColor = '#7C3AED';
        const arrowMarker = getArrowId(wrapColor, e.arrowhead);
        const pathEl = edgeG.append('path')
          .attr('d', `M${s.x},${s.y} Q${cx},${cy} ${t.x},${t.y}`)
          .attr('class', 'edge edge-animated')
          .attr('stroke', wrapColor).attr('stroke-width', 1.5)
          .attr('stroke-dasharray', '8 4');
        if (arrowMarker) pathEl.attr('marker-end', arrowMarker);
        applyEdgeStyle(pathEl, e);
      } else {
        const edgeColor = color(t.category);
        const arrowMarker = getArrowId(edgeColor, e.arrowhead);
        const lineEl = edgeG.append('line')
          .attr('x1', s.x).attr('y1', s.y).attr('x2', t.x).attr('y2', t.y)
          .attr('class', 'edge edge-animated')
          .attr('stroke', edgeColor);
        if (arrowMarker) lineEl.attr('marker-end', arrowMarker);
        applyEdgeStyle(lineEl, e);
      }

      // Edge label
      if (e.label) {
        const mx = isWrap ? (s.x + t.x) / 2 * 0.3 : (s.x + t.x) / 2;
        const my = isWrap ? (s.y + t.y) / 2 * 0.3 : (s.y + t.y) / 2;
        const labelText = edgeG.append('text').attr('x', mx).attr('y', my - 10)
          .attr('text-anchor', 'middle').attr('font-size', 11).attr('font-family', 'var(--font-mono)')
          .attr('fill', '#94A3B8').text(e.label);
        const bbox = labelText.node().getBBox();
        edgeG.insert('rect', 'text:last-of-type')
          .attr('x', bbox.x - 4).attr('y', bbox.y - 2)
          .attr('width', bbox.width + 8).attr('height', bbox.height + 4)
          .attr('rx', 3).attr('fill', '#0F172A').attr('opacity', 0.85);
      }
    });

    // Step nodes
    const nodeG = g.selectAll('.cl-node').data(steps).join('g')
      .attr('class', 'cl-node')
      .attr('transform', d => `translate(${d.x},${d.y})`)
      .attr('cursor', 'pointer');

    nodeG.append('circle').attr('r', nodeR)
      .attr('fill', d => color(d.category))
      .attr('stroke', d => d.subloop ? '#CA8A04' : d3.color(color(d.category)).brighter(0.5))
      .attr('stroke-width', d => d.subloop ? 2.5 : 1.5);

    // Step number inside
    nodeG.append('text')
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('fill', d => contrastText(color(d.category))).attr('font-size', 13).attr('font-weight', 700)
      .text(d => d.order + 1);

    // Label outside
    nodeG.append('text').attr('class', 'node-label')
      .attr('y', nodeR + 16).attr('font-size', 12)
      .text(d => d.name);

    // Interactivity
    nodeG
      .on('mouseover', (e, d) => tooltip.show(d, e))
      .on('mousemove', (e, d) => tooltip.show(d, e))
      .on('mouseout', () => tooltip.hide())
      .on('click', (e, d) => sidebar.show(d));

    svg.on('click', (e) => { if (e.target === svg.node()) sidebar.close(); });

    // Center label
    g.append('text').attr('x', cx).attr('y', cy + 4)
      .attr('text-anchor', 'middle').attr('font-size', 14).attr('font-weight', 600)
      .attr('fill', '#94A3B8').text(centerLabel);

    // Legend
    const legendEl = document.createElement('div');
    legendEl.className = 'legend';
    [{ key: 'process', label: 'Process Step' }, { key: 'decision', label: 'Decision Point' }].forEach(cat => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-swatch" style="background:${color(cat.key)}"></span>${cat.label}`;
      legendEl.appendChild(item);
    });
    document.body.appendChild(legendEl);
  })();
  </script>
</body>
</html>
